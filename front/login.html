<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="author" content="Tigas2909">

<title>Login - Igreja Batista Porto Belo</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body class="bodyLogin">

<!-- HEADER -->
<header class="header border-bottom">

<div class="logo border-right centralizar-tudo p-m-zero">
<img src="WhatsApp Image 2026-03-04 at 22.42.33.jpeg" alt="logo da igreja" class="logo-img">
</div>

<div class="name-igreja text-center letras-titulo">
<h1>Igreja Batista Porto Belo</h1>
</div>

</header>


<!-- LOGIN -->
<main class="login-area">

<div class="login-box">

<h2 class="text-center login-title">Área de Login</h2>

<div class="login-form">

    <div style="max-width:400px; width:100%; background: rgba(255,255,255,0.1); padding:20px; border-radius:10px; box-shadow:0 0 20px rgba(0,0,0,0.3);">

        <h2 class="text-center" style="color:greenyellow;">Login</h2>

        <form>

            <div class="mb-3">
                <label class="form-label" style="color:greenyellow;">Email</label>
                <input type="email" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label" style="color:greenyellow;">Senha</label>
                <input type="password" class="form-control">
            </div>

            <a href="adimin.html">
                <p class="button text-center">Entrar</p>
            </a>

        </form>

    </div>

</div>

</div>

</main>


<!-- FOOTER -->
<footer class="footer border-top">

<div class="text-center">
<p>&copy; 2026 Igreja Batista Porto Belo. Todos os direitos reservados.</p>
</div>

</footer>

</body>
</html>
